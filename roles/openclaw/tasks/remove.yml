---
# Remove openclaw — stops service, removes package and config

- name: Stop and disable openclaw service
  ansible.builtin.systemd:
    name: openclaw.service
    enabled: false
    state: stopped
  failed_when: false

- name: Remove systemd service file
  ansible.builtin.file:
    path: /etc/systemd/system/openclaw.service
    state: absent
  notify: Reload systemd

- name: Remove openclaw npm package
  community.general.npm:
    name: "@openclaw/cli"
    global: true
    state: absent

- name: Remove config directory
  ansible.builtin.file:
    path: "{{ openclaw_config_dir }}"
    state: absent

- name: Remove data directory
  ansible.builtin.file:
    path: "{{ openclaw_data_dir }}"
    state: absent
  when: openclaw_delete_data | bool

- name: Remove log directory
  ansible.builtin.file:
    path: "{{ openclaw_log_dir }}"
    state: absent
  when: openclaw_delete_data | bool

- name: Remove openclaw user and home directory
  ansible.builtin.user:
    name: "{{ openclaw_user }}"
    state: absent
    remove: true
  when: openclaw_delete_data | bool
