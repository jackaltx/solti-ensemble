---
# Install OpenClaw agent and its system dependencies
# Uses official installation method from https://docs.openclaw.ai/install/raspberry-pi

- name: Install system dependencies
  ansible.builtin.package:
    name:
      - curl
      - git
      - build-essential
    state: present

- name: Check if openclaw is already installed
  ansible.builtin.command: which openclaw
  register: openclaw_binary_check
  changed_when: false
  failed_when: false

- name: Run official OpenClaw installation script
  ansible.builtin.shell:
    cmd: curl -fsSL https://openclaw.ai/install.sh | bash
    creates: /usr/local/bin/openclaw
  when: openclaw_binary_check.rc != 0
  register: openclaw_install

- name: Verify openclaw binary exists
  ansible.builtin.command: which openclaw
  changed_when: false

- name: Create openclaw system user
  ansible.builtin.user:
    name: "{{ openclaw_user }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ openclaw_data_dir }}"
    create_home: false

- name: Create openclaw directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ openclaw_group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ openclaw_config_dir }}", owner: root,              mode: '0750' }
    - { path: "{{ openclaw_data_dir }}",   owner: "{{ openclaw_user }}", mode: '0750' }
    - { path: "{{ openclaw_log_dir }}",    owner: "{{ openclaw_user }}", mode: '0750' }

- name: Deploy openclaw systemd service
  ansible.builtin.template:
    src: openclaw.service.j2
    dest: /etc/systemd/system/openclaw.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload systemd
    - Restart openclaw
