---
# Handlers for Matrix Synapse role

- name: Restart matrix-synapse
  ansible.builtin.systemd:
    name: "{{ matrix_service_name }}"
    state: restarted
  listen: restart matrix-synapse

- name: Reload matrix-synapse
  ansible.builtin.systemd:
    name: "{{ matrix_service_name }}"
    daemon_reload: true
    state: reloaded
  listen: reload matrix-synapse

- name: Validate synapse config
  ansible.builtin.command:
    cmd: "{{ matrix_venv_path }}/bin/python -m synapse.app.homeserver --config-path={{ matrix_config_file }} --config-path={{ matrix_config_d_dir }}/ --generate-keys"
  become: true
  become_user: "{{ matrix_user }}"
  changed_when: false
  listen: validate matrix config
