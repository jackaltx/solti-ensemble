---
# Main tasks for Matrix Synapse role

- name: Load OS-specific variables
  ansible.builtin.include_vars: "{{ ansible_os_family | lower }}.yml"
  tags:
    - always

- name: Include installation tasks
  ansible.builtin.include_tasks: install_debian.yml
  when: ansible_os_family == 'Debian'
  tags:
    - install
    - packages

- name: Generate registration shared secret if not provided
  ansible.builtin.set_fact:
    matrix_registration_shared_secret: "{{ lookup('password', '/dev/null length=64 chars=ascii_letters,digits') }}"
  when: matrix_registration_shared_secret == ""
  no_log: "{{ secure_logging | default(true) }}"
  tags:
    - config

- name: Configure Matrix Synapse
  ansible.builtin.include_tasks: configure.yml
  tags:
    - config
    - configuration

- name: Create admin user
  ansible.builtin.include_tasks: create_admin.yml
  when: matrix_create_admin | bool
  tags:
    - admin
    - users

- name: Manage service state
  ansible.builtin.systemd:
    name: "{{ matrix_service_name }}"
    enabled: "{{ matrix_service_enabled }}"
    state: "{{ matrix_service_state }}"
  tags:
    - service
