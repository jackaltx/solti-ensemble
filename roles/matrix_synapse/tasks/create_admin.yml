---
# Create admin user for Matrix Synapse

- name: Verify admin password is provided
  ansible.builtin.assert:
    that:
      - matrix_admin_password is defined
      - matrix_admin_password | length > 0
    fail_msg: "matrix_admin_password must be provided when matrix_create_admin is true"
  tags:
    - admin
    - users

- name: Create admin user (idempotent with shared secret)
  ansible.builtin.shell:
    cmd: |
      {{ matrix_venv_path }}/bin/register_new_matrix_user \
        -c {{ matrix_config_file }} \
        -u {{ matrix_admin_username }} \
        -p '{{ matrix_admin_password }}' \
        -a || true
  register: admin_create_result
  no_log: "{{ secure_logging | default(true) }}"
  changed_when: "'User ID already taken' not in admin_create_result.stderr"
  failed_when: false
  tags:
    - admin
    - users

- name: Display admin user info
  ansible.builtin.debug:
    msg: "Admin user @{{ matrix_admin_username }}:{{ matrix_server_name }} configured"
  when: not (secure_logging | default(true))
  tags:
    - admin
    - users
