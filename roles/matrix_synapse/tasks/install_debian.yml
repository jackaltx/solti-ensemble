---
# Installation tasks for Debian-based systems

- name: Check if Matrix repository already configured
  ansible.builtin.stat:
    path: /etc/apt/sources.list.d/matrix-org.list
  register: matrix_repo_exists
  tags:
    - packages

- name: Add Matrix.org repository key
  ansible.builtin.get_url:
    url: "{{ matrix_repo_key_url }}"
    dest: /usr/share/keyrings/matrix-org-archive-keyring.gpg
    mode: '0644'
  when: not matrix_repo_exists.stat.exists
  tags:
    - packages

- name: Add Matrix.org repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/matrix-org-archive-keyring.gpg] {{ matrix_repo_url }} {{ ansible_distribution_release }} main"
    state: present
    filename: matrix-org
  when: not matrix_repo_exists.stat.exists
  tags:
    - packages

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  tags:
    - packages

- name: Install Matrix Synapse
  ansible.builtin.apt:
    name: "{{ matrix_package_name }}"
    state: "{{ matrix_package_state }}"
  notify:
    - validate matrix config
    - restart matrix-synapse
  tags:
    - packages

- name: Ensure Matrix directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ matrix_user }}"
    group: "{{ matrix_group }}"
    mode: '0755'
  loop:
    - "{{ matrix_config_d_dir }}"
    - "{{ matrix_data_dir }}"
    - "{{ matrix_media_store_path }}"
  tags:
    - directories
