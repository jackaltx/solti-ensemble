# Fail2ban filter for Matrix-specific abuse patterns
# Created for matrix.jackaltx.com on fleur.lavnet.net
# Catches Matrix protocol violations and abuse not covered by generic Apache filters

[Definition]

# --- Matrix Authentication Abuse ---
# Repeated 401/403 on Matrix auth endpoints (login, register)
_matrix_auth_abuse = ^<HOST> -.*"(POST|GET) /_matrix/client/.*/login.*" 401
                     ^<HOST> -.*"(POST|GET) /_matrix/client/.*/register.*" 403
                     ^<HOST> -.*"POST /_matrix/client/.*/login.*" 429

# --- Matrix Federation Abuse ---
# Federation endpoint spam or errors
_matrix_federation_abuse = ^<HOST> -.*"POST /_matrix/federation/.*" (400|403|404|429)
                          ^<HOST> -.*"GET /_matrix/federation/.*" (400|403|404)

# --- Matrix Media Abuse ---
# Upload spam or oversized requests
_matrix_media_abuse = ^<HOST> -.*"POST /_matrix/media/.*/upload.*" (413|429)
                      ^<HOST> -.*"GET /_matrix/media/.*" 404

# --- Matrix API Abuse ---
# Room creation spam
_matrix_room_abuse = ^<HOST> -.*"POST /_matrix/client/.*/createRoom.*" 429
                     ^<HOST> -.*"POST /_matrix/client/.*/join/.*" 429

# --- Matrix Discovery/Enumeration ---
# Scanning for Matrix endpoints
_matrix_scan = ^<HOST> -.*"GET /_matrix/client/versions.*" 404
               ^<HOST> -.*"GET /\.well-known/matrix/.*" 404

# --- Generic Matrix 4xx/5xx on API endpoints ---
# Catch-all for errors on Matrix API paths
_matrix_api_errors = ^<HOST> -.*"(GET|POST|PUT|DELETE) /_matrix/.*" 4[0-9][0-9]
                     ^<HOST> -.*"(GET|POST|PUT|DELETE) /_matrix/.*" 5[0-9][0-9]

# Combine all patterns
failregex = %(_matrix_auth_abuse)s
            %(_matrix_federation_abuse)s
            %(_matrix_media_abuse)s
            %(_matrix_room_abuse)s
            %(_matrix_scan)s

ignoreregex =

