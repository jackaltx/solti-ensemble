# Fail2ban filter for 4xx errors specific to matrix.jackaltx.com
# Stricter than generic apache-4xx since legitimate Matrix clients shouldn't hit 404s

[Definition]

# Match 4xx errors on matrix.jackaltx.com
# More aggressive than generic apache-4xx (maxretry=3 instead of 6)
failregex = ^<HOST> -.*"(GET|POST|PUT|DELETE).*" (404|403|400|444) .*$

ignoreregex =

