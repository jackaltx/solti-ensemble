# Matrix-specific fail2ban jails for matrix.jackaltx.com
# Template for solti-ensemble/roles/fail2ban_config

# ==================================================
# Matrix Protocol Abuse Detection
# Catches Matrix API errors, auth failures, federation spam
# ==================================================

[apache-matrix-abuse]
enabled   = {{ fail2ban_matrix_abuse_enabled | default('false') }}
port      = http,https
filter    = apache-matrix-abuse
logpath   = {{ fail2ban_matrix_logpath | default('/var/log/ispconfig/httpd/matrix.jackaltx.com/access.log') }}
findtime  = {{ fail2ban_matrix_abuse_findtime | default('5m') }}
maxretry  = {{ fail2ban_matrix_abuse_maxretry | default('10') }}
bantime   = {{ fail2ban_matrix_abuse_bantime | default('1h') }}
banaction = %(banaction_allports)s
action    = %(action_)s
            %(action_abuseipdb)s[abuseipdb_category="18"]

# ==================================================
# Stricter 4xx Detection for Matrix
# Legitimate Matrix clients don't hit 404s - lower threshold
# ==================================================

[apache-4xx-matrix]
enabled   = {{ fail2ban_matrix_4xx_enabled | default('false') }}
port      = http,https
filter    = apache-4xx-matrix
logpath   = {{ fail2ban_matrix_logpath | default('/var/log/ispconfig/httpd/matrix.jackaltx.com/access.log') }}
findtime  = {{ fail2ban_matrix_4xx_findtime | default('5m') }}
maxretry  = {{ fail2ban_matrix_4xx_maxretry | default('3') }}
bantime   = {{ fail2ban_matrix_4xx_bantime | default('1h') }}
banaction = %(banaction_allports)s
action    = %(action_)s
            %(action_abuseipdb)s[abuseipdb_category="21"]

